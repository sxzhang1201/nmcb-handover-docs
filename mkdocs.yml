site_name: NMCB Hand-over Documentation
site_description: Operational, data management, and data engineering hand-over for NMCB
site_url: https://example.github.io/nmcb-handover/
repo_name: nmcb-handover

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Scope of this hand-over: getting-started.md
      - First 30 days: first-30-days.md
      - Where everything lives: where-everything-lives.md
  - Data Lifecycle:
      - Lifecycle overview: lifecycle/index.md
      - Design: lifecycle/design.md
      - Collection: lifecycle/collection.md
      - Storage: lifecycle/storage.md
      - Cleaning: lifecycle/cleaning.md
      - Modelling: lifecycle/modelling.md
      - Issuing: lifecycle/issuing.md
      - Analysis: lifecycle/analysis.md
      - Publication: lifecycle/publication.md
  - Systems:
      - Data architecture: systems/data-architecture.md
      - Castor EDC: systems/castor.md
      - Devices: systems/devices.md
      - Scripts and QC: systems/scripts-and-qc.md
      - Snowflake and structured data: systems/snowflake.md
      - Research Drive: systems/research-drive.md
      - Biobank: systems/biobank.md
      - Multicentre data: systems/multicentre.md
      - OpenSpecimen: systems/openspecimen.md
      - myDRE: systems/mydre.md
      - LDOT: systems/ldot.md
      - GitHub: systems/github.md
  - Operations & Governance:
      - Operations overview: operations/index.md
      - Regular tasks: operations/regular-tasks.md
      - Issue log and escalation: operations/escalation.md
      - Data requests: governance/data-requests.md
      - SOPs and documentation: governance/sops.md
      - Risks and improvement backlog: governance/backlog.md
      - Task template: operations/task-template.md
